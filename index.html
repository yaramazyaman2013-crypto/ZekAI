<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZekAI - Depo Sohbet</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36;
    --text: #e6e6e6; --muted: #9aa3b2; --accent: #5b8def;
    --user: #1f4068; --bot: #1f2a3a;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }
  header { padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:18px; }
  .status { font-size:12px; color:var(--muted); }
  .controls { padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .controls select, .controls button {
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:8px 10px; border-radius:6px; font-size:13px; }
  .controls button { cursor:pointer; }
  .controls button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .controls button:disabled { opacity:0.5; cursor:not-allowed; }
  .books { display:flex; gap:10px; flex-wrap:wrap; padding:10px 16px;
    background:var(--panel); border-bottom:1px solid var(--border); max-height:140px; overflow-y:auto; }
  .book { border:1px solid var(--border); padding:6px 10px; border-radius:6px;
    font-size:12px; display:flex; align-items:center; gap:6px; }
  .book.loaded { border-color:#3b8d4f; }
  .book .badge { font-size:11px; color:var(--muted); }
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:10px 14px; border-radius:10px; white-space:pre-wrap;
    line-height:1.45; font-size:14px; }
  .msg.user { background:var(--user); align-self:flex-end; }
  .msg.bot  { background:var(--bot); align-self:flex-start; }
  .msg.sys  { background:#2a1f1f; align-self:center; font-size:12px; color:#f3b6b6; }
  footer { padding:10px 16px; background:var(--panel); border-top:1px solid var(--border);
    display:flex; gap:8px; }
  footer textarea { flex:1; resize:none; min-height:44px; max-height:160px;
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:10px; border-radius:6px; font-size:14px; font-family:inherit; }
  footer button { background:var(--accent); color:#fff; border:none; padding:0 18px;
    border-radius:6px; cursor:pointer; font-size:14px; }
  footer button:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <h1>📚 ZekAI</h1>
  <span class="status" id="status">Başlatılıyor…</span>
</header>

<div class="controls">
  <select id="model">
    <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
    <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
    <option value="deepseek-r1-distill-llama-70b">deepseek-r1-distill-llama-70b</option>
    <option value="gemma2-9b-it">gemma2-9b-it</option>
  </select>
  <button id="refreshBtn" class="primary">Depoyu Yeniden Yükle</button>
  <button id="clearBtn">Sohbeti Temizle</button>
</div>

<div class="books" id="booksBar"></div>

<div id="chat"></div>

<footer>
  <textarea id="input" placeholder="Depo içeriği hakkında soru sorun…"></textarea>
  <button id="sendBtn" disabled>Gönder</button>
</footer>

<script>
const state = { files: [], history: [], ready: false };

const $ = id => document.getElementById(id);
const chatEl = $("chat");
const statusEl = $("status");
const sendBtn = $("sendBtn");
const inputEl = $("input");
const booksBar = $("booksBar");

$("model").value = localStorage.getItem("zekai_model") || "llama-3.3-70b-versatile";
$("model").addEventListener("change", e => localStorage.setItem("zekai_model", e.target.value));

function setStatus(t){ statusEl.textContent = t; }
function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function renderBooks() {
  booksBar.innerHTML = "";
  if (state.files.length === 0) {
    booksBar.innerHTML = `<span class="status">Dosya yok.</span>`;
    return;
  }
  for (const f of state.files) {
    const div = document.createElement("div");
    const ok = !!f.text;
    div.className = "book" + (ok ? " loaded" : "");
    const size = ok ? `${f.text.length.toLocaleString("tr")} krk` : "yüklenmedi";
    div.innerHTML = `<span>${ok ? "✅" : "⬜"} ${f.path}</span><span class="badge">${size}</span>`;
    booksBar.appendChild(div);
  }
}

async function loadAll() {
  $("refreshBtn").disabled = true;
  state.ready = false;
  sendBtn.disabled = true;
  try {
    setStatus("Veri yükleniyor…");
    const r = await fetch("/data.json", { cache: "no-store" });
    if (!r.ok) throw new Error("data.json bulunamadı (" + r.status + "). Vercel build'i çalıştı mı?");
    const data = await r.json();
    state.files = data.files || [];
    renderBooks();
    state.ready = true;
    sendBtn.disabled = false;
    const ok = state.files.filter(x=>x.text).length;
    const when = data.generatedAt ? new Date(data.generatedAt).toLocaleString("tr") : "?";
    setStatus(`Hazır. ${ok} dosya · build: ${when}`);
    if (chatEl.children.length === 0)
      addMsg("bot", `Depodaki ${ok} dosyayı okudum. Sormak istediğinizi yazın.`);
  } catch (e) {
    setStatus("Hata: " + e.message);
    addMsg("sys", e.message);
  } finally {
    $("refreshBtn").disabled = false;
  }
}

$("refreshBtn").onclick = loadAll;
$("clearBtn").onclick = () => { state.history = []; chatEl.innerHTML = ""; };

function findRelevantSnippets(query, perFileChars = 4000, maxFiles = 8) {
  const stop = new Set(["ve","ile","bir","bu","şu","ne","mi","mı","mu","mü","da","de","ki","için","gibi","göre","nedir","kimdir","nasıl","the","a","an","of","is","what","who","how"]);
  const terms = query.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu," ").split(/\s+/)
    .filter(w => w.length > 2 && !stop.has(w));
  if (terms.length === 0) terms.push(query.toLowerCase());

  const scored = [];
  for (const f of state.files) {
    if (!f.text) continue;
    const lower = f.text.toLowerCase();
    let score = 0;
    const hits = [];
    for (const t of terms) {
      let idx = 0, n = 0;
      while ((idx = lower.indexOf(t, idx)) !== -1 && n < 50) {
        hits.push(idx); idx += t.length; n++; score++;
      }
    }
    if (score > 0 || state.files.length <= maxFiles) scored.push({ f, score, hits });
  }
  scored.sort((a,b) => b.score - a.score);
  const top = scored.slice(0, maxFiles);
  const parts = [];
  for (const { f, hits } of top) {
    hits.sort((a,b)=>a-b);
    let collected = "";
    const used = [];
    for (const h of hits) {
      if (collected.length >= perFileChars) break;
      const s = Math.max(0, h - 300), e = Math.min(f.text.length, h + 500);
      if (used.some(([a,b]) => s < b && e > a)) continue;
      used.push([s,e]);
      collected += "\n...\n" + f.text.slice(s, e);
    }
    if (!collected) collected = f.text.slice(0, 1500);
    parts.push(`### ${f.path}\n${collected.trim()}`);
  }
  return parts.join("\n\n");
}

async function askLLM(query) {
  const model = $("model").value;
  const context = findRelevantSnippets(query);
  const sys = `Sen ZekAI'sın. Aşağıdaki depo dosyalarından elde edilen pasajlara dayanarak Türkçe yanıt ver. Cevabını verdiğin dosyayı parantez içinde belirt (örn: (1984.pdf)). Pasajlarda yanıt yoksa "Depoda bu bilgi bulunmuyor" de.

PASAJLAR:
${context}`;

  const messages = [{ role: "system", content: sys }];
  for (const m of state.history)
    messages.push({ role: m.role === "user" ? "user" : "assistant", content: m.text });
  messages.push({ role: "user", content: query });

  const resp = await fetch("/api/groq?model=" + encodeURIComponent(model), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages,
      temperature: 0.4,
      max_tokens: 1500,
    }),
  });
  if (!resp.ok) throw new Error("API: " + resp.status + " " + await resp.text());
  const data = await resp.json();
  return data?.choices?.[0]?.message?.content || "(Boş yanıt)";
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = "";
  addMsg("user", q);
  state.history.push({ role: "user", text: q });
  const thinking = addMsg("bot", "Düşünüyor…");
  sendBtn.disabled = true;
  try {
    const ans = await askLLM(q);
    thinking.textContent = ans;
    state.history.push({ role: "model", text: ans });
  } catch (e) {
    thinking.remove();
    addMsg("sys", e.message);
  } finally {
    sendBtn.disabled = !state.ready;
  }
}

sendBtn.onclick = send;
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

window.addEventListener("load", () => { renderBooks(); loadAll(); });
</script>
</body>
</html>
