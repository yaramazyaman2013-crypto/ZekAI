<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZekAI</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36;
    --text: #e6e6e6; --muted: #9aa3b2; --accent: #5b8def;
    --user: #1f4068; --bot: #1f2a3a;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }
  header { padding:14px 20px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header img.logo { height:120px; width:auto; display:block; }
  .hint { font-size:13px; color:var(--muted); }
  .controls { padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .controls select, .controls button {
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:8px 10px; border-radius:6px; font-size:13px; cursor:pointer; }
  .controls button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }

  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }

  /* Mesaj satırı: bot için soldan logo + balon, kullanıcı için sağda balon */
  .row { display:flex; align-items:flex-start; gap:10px; max-width:85%; }
  .row.user { align-self:flex-end; flex-direction:row-reverse; }
  .row.bot  { align-self:flex-start; }
  .row.sys  { align-self:center; }
  .avatar { width:36px; height:36px; flex:0 0 36px; border-radius:50%;
    background:#0b0d12; display:flex; align-items:center; justify-content:center;
    overflow:hidden; }
  .avatar img { width:30px; height:30px; object-fit:contain; display:block; }

  .msg { padding:10px 14px; border-radius:12px; white-space:pre-wrap;
    line-height:1.45; font-size:14px; word-wrap:break-word; }
  .row.user .msg { background:var(--user); }
  .row.bot  .msg { background:var(--bot); }
  .row.sys  .msg { background:#2a1f1f; font-size:12px; color:#f3b6b6;
    padding:6px 10px; border-radius:8px; }
  .msg img.gen { max-width:100%; border-radius:8px; margin-top:8px; display:block; }
  .msg a.dl { display:inline-block; margin-top:6px; font-size:12px; color:var(--accent); }

  footer { padding:10px 16px; background:var(--panel); border-top:1px solid var(--border);
    display:flex; gap:8px; }
  footer textarea { flex:1; resize:none; min-height:44px; max-height:160px;
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:10px; border-radius:6px; font-size:14px; font-family:inherit; }
  footer button { color:#fff; border:none; padding:0 16px;
    border-radius:6px; cursor:pointer; font-size:14px; white-space:nowrap; }
  footer button.send  { background:var(--accent); }
  footer button.image { background:#7a4ad9; }
  footer button:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <img src="/logo.svg" alt="ZekAI" class="logo" />
  <span class="hint">Yaz → Gönder · Resim için kutuya açıklama yaz → 🖼️ Resim Oluştur</span>
</header>

<div class="controls">
  <select id="model">
    <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
    <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
    <option value="deepseek-r1-distill-llama-70b">deepseek-r1-distill-llama-70b</option>
    <option value="gemma2-9b-it">gemma2-9b-it</option>
  </select>
  <button id="clearBtn">Sohbeti Temizle</button>
</div>

<div id="chat"></div>

<footer>
  <textarea id="input" placeholder="Bir şey yazın… (Enter: gönder, Shift+Enter: satır)"></textarea>
  <button id="imageBtn" class="image" title="Yazdığınız metni görsel olarak üret">🖼️ Resim Oluştur</button>
  <button id="sendBtn" class="send">Gönder</button>
</footer>

<script>
const SYSTEM_PROMPT = `Sen ZekAI'sın. Türkçe konuşan bir yardımcı AI asistanısın.

Kendin hakkında bilmen gerekenler:
- Adın: ZekAI
- Çalıştığın yer: Vercel üzerinde host ediliyorsun
- Sohbet motoru: Groq (varsayılan model: llama-3.3-70b-versatile)
- Resim üretimi: Kullanıcı "🖼️ Resim Oluştur" butonuna basarsa ya da "/resim <açıklama>" yazarsa Together AI'nın FLUX.1-schnell modeli devreye girer (sen değil, arayüz yapar).
- Yapamadıkların: ses üretme, video üretme, gerçek zamanlı internet araması, dosya okuma, kod çalıştırma.

Kibar, doğal, kısa ve net cevap ver. Kendin hakkında soru gelirse yukarıdaki bilgileri kullan.`;

const state = { history: [] };

const $ = id => document.getElementById(id);
const chatEl = $("chat");
const sendBtn = $("sendBtn");
const imageBtn = $("imageBtn");
const inputEl = $("input");

$("model").value = localStorage.getItem("zekai_model") || "llama-3.3-70b-versatile";
$("model").addEventListener("change", e => localStorage.setItem("zekai_model", e.target.value));

function makeRow(role) {
  const row = document.createElement("div");
  row.className = "row " + role;
  if (role === "bot") {
    const av = document.createElement("div");
    av.className = "avatar";
    const im = document.createElement("img");
    im.src = "/logo.svg";
    im.alt = "ZekAI";
    av.appendChild(im);
    row.appendChild(av);
  }
  return row;
}

function addMsg(role, text) {
  const row = makeRow(role);
  const msg = document.createElement("div");
  msg.className = "msg";
  msg.textContent = text;
  row.appendChild(msg);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return msg;
}

function addImage(prompt, dataUrl, refined) {
  const row = makeRow("bot");
  const msg = document.createElement("div");
  msg.className = "msg";
  const cap = document.createElement("div");
  cap.textContent = "🎨 " + prompt;
  msg.appendChild(cap);
  if (refined && refined.trim() && refined.trim() !== prompt.trim()) {
    const r = document.createElement("div");
    r.style.cssText = "font-size:11px;color:var(--muted);margin-top:2px";
    r.textContent = "↳ " + refined;
    msg.appendChild(r);
  }
  const img = document.createElement("img");
  img.className = "gen";
  img.src = dataUrl;
  img.alt = prompt;
  const dl = document.createElement("a");
  dl.className = "dl";
  dl.href = dataUrl;
  dl.download = "zekai-" + Date.now() + ".png";
  dl.textContent = "indir";
  msg.append(img, dl);
  row.appendChild(msg);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function chat(query) {
  const model = $("model").value;
  const messages = [{ role: "system", content: SYSTEM_PROMPT }];
  for (const m of state.history) messages.push(m);
  messages.push({ role: "user", content: query });

  const resp = await fetch("/api/groq?model=" + encodeURIComponent(model), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages, temperature: 0.6, max_tokens: 1500 }),
  });
  if (!resp.ok) throw new Error("Groq API: " + resp.status + " " + await resp.text());
  const data = await resp.json();
  const ans = data?.choices?.[0]?.message?.content || "(Boş yanıt)";
  state.history.push({ role: "user", content: query });
  state.history.push({ role: "assistant", content: ans });
  if (state.history.length > 30) state.history.splice(0, state.history.length - 30);
  return ans;
}

async function generateImage(prompt) {
  const resp = await fetch("/api/image", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, width: 1024, height: 1024 }),
  });
  if (!resp.ok) throw new Error("Image API: " + resp.status + " " + await resp.text());
  const data = await resp.json();
  const item = data?.data?.[0];
  if (!item) throw new Error("Resim dönmedi");
  const refined = data.refined_prompt;
  if (item.b64_json) return { url: "data:image/png;base64," + item.b64_json, refined };
  if (item.url) return { url: item.url, refined };
  throw new Error("Resim formatı tanınmadı");
}

function busy(b) {
  sendBtn.disabled = b;
  imageBtn.disabled = b;
}

async function send() {
  const raw = inputEl.value.trim();
  if (!raw) return;
  inputEl.value = "";
  busy(true);
  addMsg("user", raw);

  const slash = raw.match(/^\/(?:resim|img|image)\s+(.+)$/i);
  if (slash) {
    await doImage(slash[1].trim());
  } else {
    const thinking = addMsg("bot", "Düşünüyor…");
    try {
      const ans = await chat(raw);
      thinking.textContent = ans;
    } catch (e) {
      thinking.parentElement.remove();
      addMsg("sys", e.message);
    }
  }

  busy(false);
  inputEl.focus();
}

async function doImage(prompt) {
  const placeholder = addMsg("bot", "🎨 Prompt çevriliyor ve resim üretiliyor… (15-30 sn)");
  try {
    const { url, refined } = await generateImage(prompt);
    placeholder.parentElement.remove();
    addImage(prompt, url, refined);
  } catch (e) {
    placeholder.parentElement.remove();
    addMsg("sys", e.message);
  }
}

async function imageFromInput() {
  const raw = inputEl.value.trim();
  if (!raw) {
    addMsg("sys", "Önce kutuya bir görsel açıklaması yazın.");
    return;
  }
  inputEl.value = "";
  busy(true);
  addMsg("user", "🖼️ " + raw);
  await doImage(raw);
  busy(false);
  inputEl.focus();
}

sendBtn.onclick = send;
imageBtn.onclick = imageFromInput;
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

$("clearBtn").onclick = () => { state.history = []; chatEl.innerHTML = ""; };

addMsg("bot", "Merhaba! Ben ZekAI. Sohbet için yaz → Gönder. Resim için açıklamayı yaz → 🖼️ Resim Oluştur.");
</script>
</body>
</html>
