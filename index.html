<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZekAI - Depo Kitapları Sohbet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #e6e6e6;
    --muted: #9aa3b2;
    --accent: #5b8def;
    --user: #1f4068;
    --bot: #1f2a3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; }
  header .status { font-size: 12px; color: var(--muted); }
  .controls {
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .controls input, .controls select, .controls button {
    background: #11141a; color: var(--text); border: 1px solid var(--border);
    padding: 8px 10px; border-radius: 6px; font-size: 13px;
  }
  .controls input[type=password] { width: 260px; }
  .controls button { cursor: pointer; }
  .controls button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
  .books { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border); }
  .book {
    border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px;
    font-size: 12px; display: flex; align-items: center; gap: 6px;
  }
  .book.loaded { border-color: #3b8d4f; }
  .book .badge { font-size: 11px; color: var(--muted); }
  #chat {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; white-space: pre-wrap; line-height: 1.45; font-size: 14px; }
  .msg.user { background: var(--user); align-self: flex-end; }
  .msg.bot  { background: var(--bot); align-self: flex-start; }
  .msg.sys  { background: #2a1f1f; align-self: center; font-size: 12px; color: #f3b6b6; }
  footer {
    padding: 10px 16px; background: var(--panel); border-top: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  footer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 160px;
    background: #11141a; color: var(--text); border: 1px solid var(--border);
    padding: 10px; border-radius: 6px; font-size: 14px; font-family: inherit;
  }
  footer button {
    background: var(--accent); color: #fff; border: none; padding: 0 18px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  footer button:disabled { opacity: 0.5; cursor: not-allowed; }
  a { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>📚 ZekAI</h1>
  <span class="status" id="status">Hazır değil — API anahtarı girin ve kitapları yükleyin.</span>
</header>

<div class="controls">
  <input id="apiKey" type="password" placeholder="Google Gemini API key (aistudio.google.com)" />
  <select id="model">
    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
    <option value="gemini-2.5-flash">gemini-2.5-flash</option>
    <option value="gemini-2.5-pro">gemini-2.5-pro</option>
  </select>
  <button id="loadBtn" class="primary">Kitapları Yükle</button>
  <button id="clearBtn">Sohbeti Temizle</button>
</div>

<div class="books" id="booksBar"></div>

<div id="chat"></div>

<footer>
  <textarea id="input" placeholder="Kitaplar hakkında soru sorun... (örn: 1984'te Büyük Birader kimdir? / TDK'ya göre 'özgürlük' nedir? / Kapital'de meta nedir?)"></textarea>
  <button id="sendBtn" disabled>Gönder</button>
</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const REPO_RAW = "https://raw.githubusercontent.com/yaramazyaman2013-crypto/ZekAI/main/";
const BOOKS = [
  { id: "orwell", title: "1984 — George Orwell",
    file: "18153356_1984_-_George_Orwell__PDFDrive.com_.pdf" },
  { id: "tdk", title: "TDK Büyük Türkçe Sözlük",
    file: "29021127_16230146_TDK___Buyuk_Turkce_Sozluk.pdf" },
  { id: "marx", title: "Kapital Cilt 1 — Karl Marx",
    file: "Karl Marx - Kapital Cilt 1 (Yordam Yay.).pdf" },
];

const state = {
  texts: {},          // id -> full text
  history: [],        // {role, text}
  loaded: false,
};

const $ = id => document.getElementById(id);
const chatEl = $("chat");
const statusEl = $("status");
const sendBtn = $("sendBtn");
const inputEl = $("input");
const booksBar = $("booksBar");

function renderBooks() {
  booksBar.innerHTML = "";
  for (const b of BOOKS) {
    const div = document.createElement("div");
    div.className = "book" + (state.texts[b.id] ? " loaded" : "");
    const size = state.texts[b.id] ? `(${state.texts[b.id].length.toLocaleString("tr")} karakter)` : "(yüklenmedi)";
    div.innerHTML = `<span>${state.texts[b.id] ? "✅" : "⬜"} ${b.title}</span><span class="badge">${size}</span>`;
    booksBar.appendChild(div);
  }
}
renderBooks();

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

async function extractPdfText(url) {
  const pdf = await pdfjsLib.getDocument({ url, withCredentials: false }).promise;
  let text = "";
  const max = pdf.numPages;
  for (let i = 1; i <= max; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n\n";
    if (i % 20 === 0) statusEl.textContent = `Yükleniyor... sayfa ${i}/${max}`;
  }
  return text;
}

$("loadBtn").onclick = async () => {
  $("loadBtn").disabled = true;
  try {
    for (const b of BOOKS) {
      statusEl.textContent = `İndiriliyor: ${b.title}`;
      const url = REPO_RAW + encodeURIComponent(b.file).replace(/%2F/g, "/");
      const text = await extractPdfText(url);
      state.texts[b.id] = text;
      renderBooks();
    }
    state.loaded = true;
    statusEl.textContent = "Kitaplar yüklendi. Soru sorabilirsiniz.";
    sendBtn.disabled = false;
    addMsg("bot", "Merhaba! Depodaki 3 kitabı (1984, TDK Sözlük, Kapital Cilt 1) okudum. Sormak istediğiniz şeyi yazın.");
  } catch (e) {
    statusEl.textContent = "Hata: " + e.message;
    addMsg("sys", "PDF yükleme hatası: " + e.message);
  } finally {
    $("loadBtn").disabled = false;
  }
};

$("clearBtn").onclick = () => {
  state.history = [];
  chatEl.innerHTML = "";
};

// Basit anahtar kelime tabanlı pasaj bulucu (RAG benzeri)
function findRelevantSnippets(query, maxCharsPerBook = 8000) {
  const stop = new Set(["ve","ile","bir","bu","şu","o","ne","mi","mı","mu","mü","da","de","ki","için","gibi","göre","kim","ne","nedir","kimdir","nasıl"]);
  const terms = query.toLowerCase()
    .replace(/[^\p{L}\p{N}\s]/gu, " ")
    .split(/\s+/).filter(w => w.length > 2 && !stop.has(w));
  if (terms.length === 0) terms.push(query.toLowerCase());

  const out = [];
  for (const b of BOOKS) {
    const text = state.texts[b.id];
    if (!text) continue;
    const lower = text.toLowerCase();
    const hits = [];
    for (const t of terms) {
      let idx = 0;
      while ((idx = lower.indexOf(t, idx)) !== -1 && hits.length < 30) {
        hits.push(idx);
        idx += t.length;
      }
    }
    hits.sort((a,b)=>a-b);
    // Hitleri parça parça topla, üst üste binmesin
    let collected = "";
    const used = [];
    for (const h of hits) {
      if (collected.length >= maxCharsPerBook) break;
      const start = Math.max(0, h - 400);
      const end = Math.min(text.length, h + 600);
      if (used.some(([s,e]) => start < e && end > s)) continue;
      used.push([start,end]);
      collected += "\n...\n" + text.slice(start, end);
    }
    if (!collected) collected = text.slice(0, 2000); // hiç eşleşme yoksa baş tarafı
    out.push(`### ${b.title}\n${collected.trim()}`);
  }
  return out.join("\n\n");
}

async function askGemini(query) {
  const apiKey = $("apiKey").value.trim();
  if (!apiKey) throw new Error("Önce Gemini API anahtarınızı girin.");
  const model = $("model").value;

  const context = findRelevantSnippets(query);
  const sys = `Sen ZekAI'sın. Yalnızca aşağıdaki üç kitaptan elde edilen pasajlara dayanarak Türkçe yanıt ver: George Orwell — 1984, TDK Büyük Türkçe Sözlük, Karl Marx — Kapital Cilt 1. Cevabını verdiğin kaynağı parantez içinde belirt. Eğer pasajlarda yanıt yoksa açıkça "Verilen kitaplarda bu bilgi bulunmuyor" de.

İLGİLİ PASAJLAR:
${context}`;

  const contents = [];
  for (const m of state.history) {
    contents.push({ role: m.role === "user" ? "user" : "model",
                    parts: [{ text: m.text }] });
  }
  contents.push({ role: "user", parts: [{ text: query }] });

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const resp = await fetch(url, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: sys }] },
      contents,
      generationConfig: { temperature: 0.4, maxOutputTokens: 1024 }
    })
  });
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error("API hatası: " + resp.status + " " + t);
  }
  const data = await resp.json();
  const out = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("\n") || "(Boş yanıt)";
  return out;
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = "";
  addMsg("user", q);
  state.history.push({ role: "user", text: q });
  const thinking = addMsg("bot", "Düşünüyor...");
  sendBtn.disabled = true;
  try {
    const ans = await askGemini(q);
    thinking.textContent = ans;
    state.history.push({ role: "model", text: ans });
  } catch (e) {
    thinking.remove();
    addMsg("sys", e.message);
  } finally {
    sendBtn.disabled = !state.loaded;
  }
}

sendBtn.onclick = send;
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// API key & model persistance
$("apiKey").value = localStorage.getItem("zekai_key") || "";
$("model").value = localStorage.getItem("zekai_model") || "gemini-2.0-flash";
$("apiKey").addEventListener("change", e => localStorage.setItem("zekai_key", e.target.value));
$("model").addEventListener("change", e => localStorage.setItem("zekai_model", e.target.value));
</script>
</body>
</html>
