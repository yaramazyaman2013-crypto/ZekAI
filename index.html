<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZekAI</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36;
    --text: #e6e6e6; --muted: #9aa3b2; --accent: #5b8def;
    --user: #1f4068; --bot: #1f2a3a;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }
  header { padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header img.logo { height:40px; width:auto; display:block; }
  header h1 { margin:0; font-size:18px; }
  .hint { font-size:12px; color:var(--muted); }
  .controls { padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .controls select, .controls button {
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:8px 10px; border-radius:6px; font-size:13px; cursor:pointer; }
  .controls button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:10px 14px; border-radius:10px; white-space:pre-wrap;
    line-height:1.45; font-size:14px; }
  .msg.user { background:var(--user); align-self:flex-end; }
  .msg.bot  { background:var(--bot); align-self:flex-start; }
  .msg.sys  { background:#2a1f1f; align-self:center; font-size:12px; color:#f3b6b6; }
  .msg img { max-width:100%; border-radius:8px; margin-top:6px; display:block; }
  .msg a.dl { display:inline-block; margin-top:4px; font-size:12px; color:var(--accent); }
  footer { padding:10px 16px; background:var(--panel); border-top:1px solid var(--border);
    display:flex; gap:8px; }
  footer textarea { flex:1; resize:none; min-height:44px; max-height:160px;
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:10px; border-radius:6px; font-size:14px; font-family:inherit; }
  footer button { background:var(--accent); color:#fff; border:none; padding:0 18px;
    border-radius:6px; cursor:pointer; font-size:14px; }
  footer button:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <img src="/logo.svg" alt="ZekAI" class="logo" />
  <span class="hint">Resim için: <code>/resim &lt;açıklama&gt;</code></span>
</header>

<div class="controls">
  <select id="model">
    <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
    <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
    <option value="deepseek-r1-distill-llama-70b">deepseek-r1-distill-llama-70b</option>
    <option value="gemma2-9b-it">gemma2-9b-it</option>
  </select>
  <button id="clearBtn">Sohbeti Temizle</button>
</div>

<div id="chat"></div>

<footer>
  <textarea id="input" placeholder="Bir şey yazın… (Enter: gönder, Shift+Enter: satır)"></textarea>
  <button id="sendBtn">Gönder</button>
</footer>

<script>
const SYSTEM_PROMPT = `Sen ZekAI'sın. Türkçe konuşan bir yardımcı AI asistanısın.

Kendin hakkında bilmen gerekenler:
- Adın: ZekAI
- Çalıştığın yer: Vercel üzerinde host ediliyorsun
- Sohbet motoru: Groq (varsayılan model: llama-3.3-70b-versatile)
- Resim üretimi: Kullanıcı "/resim <açıklama>" yazarsa Together AI'nın FLUX.1-schnell modeli devreye girer (sen değil, arayüz yapar).
- Yapamadıkların: ses üretme, video üretme, gerçek zamanlı internet araması, dosya okuma, kod çalıştırma.

Kibar, doğal, kısa ve net cevap ver. Kendin hakkında soru gelirse yukarıdaki bilgileri kullan.`;

const state = { history: [] };

const $ = id => document.getElementById(id);
const chatEl = $("chat");
const sendBtn = $("sendBtn");
const inputEl = $("input");

$("model").value = localStorage.getItem("zekai_model") || "llama-3.3-70b-versatile";
$("model").addEventListener("change", e => localStorage.setItem("zekai_model", e.target.value));

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addImage(prompt, dataUrl) {
  const div = document.createElement("div");
  div.className = "msg bot";
  const cap = document.createElement("div");
  cap.textContent = "🎨 " + prompt;
  const img = document.createElement("img");
  img.src = dataUrl;
  img.alt = prompt;
  const dl = document.createElement("a");
  dl.className = "dl";
  dl.href = dataUrl;
  dl.download = "zekai-" + Date.now() + ".png";
  dl.textContent = "indir";
  div.append(cap, img, dl);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function chat(query) {
  const model = $("model").value;
  const messages = [{ role: "system", content: SYSTEM_PROMPT }];
  for (const m of state.history) messages.push(m);
  messages.push({ role: "user", content: query });

  const resp = await fetch("/api/groq?model=" + encodeURIComponent(model), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages, temperature: 0.6, max_tokens: 1500 }),
  });
  if (!resp.ok) throw new Error("Groq API: " + resp.status + " " + await resp.text());
  const data = await resp.json();
  const ans = data?.choices?.[0]?.message?.content || "(Boş yanıt)";
  state.history.push({ role: "user", content: query });
  state.history.push({ role: "assistant", content: ans });
  // Sohbet geçmişini makul tut
  if (state.history.length > 30) state.history.splice(0, state.history.length - 30);
  return ans;
}

async function generateImage(prompt) {
  const resp = await fetch("/api/image", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, width: 1024, height: 1024 }),
  });
  if (!resp.ok) throw new Error("Image API: " + resp.status + " " + await resp.text());
  const data = await resp.json();
  const item = data?.data?.[0];
  if (!item) throw new Error("Resim dönmedi");
  if (item.b64_json) return "data:image/png;base64," + item.b64_json;
  if (item.url) return item.url;
  throw new Error("Resim formatı tanınmadı");
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = "";
  sendBtn.disabled = true;
  addMsg("user", q);

  const imageMatch = q.match(/^\/(?:resim|img|image)\s+(.+)$/i);

  if (imageMatch) {
    const prompt = imageMatch[1].trim();
    const placeholder = addMsg("bot", "🎨 Resim üretiliyor…");
    try {
      const url = await generateImage(prompt);
      placeholder.remove();
      addImage(prompt, url);
    } catch (e) {
      placeholder.remove();
      addMsg("sys", e.message);
    }
  } else {
    const thinking = addMsg("bot", "Düşünüyor…");
    try {
      const ans = await chat(q);
      thinking.textContent = ans;
    } catch (e) {
      thinking.remove();
      addMsg("sys", e.message);
    }
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.onclick = send;
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

$("clearBtn").onclick = () => { state.history = []; chatEl.innerHTML = ""; };

addMsg("bot", "Merhaba! Ben ZekAI. Bir şey sorabilir ya da \"/resim <açıklama>\" yazarak resim oluşturabilirsin.");
</script>
</body>
</html>
