<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZekAI - Depo Sohbet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36;
    --text: #e6e6e6; --muted: #9aa3b2; --accent: #5b8def;
    --user: #1f4068; --bot: #1f2a3a;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }
  header { padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:18px; }
  .status { font-size:12px; color:var(--muted); }
  .controls { padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .controls input, .controls select, .controls button {
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:8px 10px; border-radius:6px; font-size:13px; }
  .controls input[type=password] { width:260px; }
  .controls input[type=text] { width:200px; }
  .controls button { cursor:pointer; }
  .controls button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .controls button:disabled { opacity:0.5; cursor:not-allowed; }
  .books { display:flex; gap:10px; flex-wrap:wrap; padding:10px 16px;
    background:var(--panel); border-bottom:1px solid var(--border); max-height:140px; overflow-y:auto; }
  .book { border:1px solid var(--border); padding:6px 10px; border-radius:6px;
    font-size:12px; display:flex; align-items:center; gap:6px; }
  .book.loaded { border-color:#3b8d4f; }
  .book .badge { font-size:11px; color:var(--muted); }
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:10px 14px; border-radius:10px; white-space:pre-wrap;
    line-height:1.45; font-size:14px; }
  .msg.user { background:var(--user); align-self:flex-end; }
  .msg.bot  { background:var(--bot); align-self:flex-start; }
  .msg.sys  { background:#2a1f1f; align-self:center; font-size:12px; color:#f3b6b6; }
  footer { padding:10px 16px; background:var(--panel); border-top:1px solid var(--border);
    display:flex; gap:8px; }
  footer textarea { flex:1; resize:none; min-height:44px; max-height:160px;
    background:#11141a; color:var(--text); border:1px solid var(--border);
    padding:10px; border-radius:6px; font-size:14px; font-family:inherit; }
  footer button { background:var(--accent); color:#fff; border:none; padding:0 18px;
    border-radius:6px; cursor:pointer; font-size:14px; }
  footer button:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <h1>📚 ZekAI</h1>
  <span class="status" id="status">Başlatılıyor…</span>
</header>

<div class="controls">
  <input id="repo" type="text" placeholder="owner/repo" />
  <input id="branch" type="text" placeholder="branch" />
  <input id="ghToken" type="password" placeholder="GitHub PAT (private depo için)" />
  <input id="apiKey" type="password" placeholder="Gemini API key" />
  <select id="model">
    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
    <option value="gemini-2.5-flash">gemini-2.5-flash</option>
    <option value="gemini-2.5-pro">gemini-2.5-pro</option>
  </select>
  <button id="refreshBtn" class="primary">Depoyu Tara & Yükle</button>
  <button id="clearBtn">Sohbeti Temizle</button>
</div>

<div class="books" id="booksBar"></div>

<div id="chat"></div>

<footer>
  <textarea id="input" placeholder="Depo içeriği hakkında soru sorun…"></textarea>
  <button id="sendBtn" disabled>Gönder</button>
</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const DEFAULT_REPO = "yaramazyaman2013-crypto/ZekAI";
const DEFAULT_BRANCH = "main";
const DEFAULT_KEY = "AIzaSyAUomWwgg5x4eNiHwFDTv6QcmtVYAkHo9g";
const DEFAULT_GHTOKEN = "";  // Push protection nedeniyle PAT'i koda gömemiyoruz; tarayıcıdaki kutuya elle girin.

const TEXT_EXT = ["txt","md","markdown","json","csv","html","htm","xml","yml","yaml",
                  "js","ts","py","java","c","cpp","h","cs","go","rs","rb","php","sh","sql","ini","toml","log"];
const PDF_EXT = ["pdf"];

const state = {
  files: [],            // {path, ext, sha, size, url, text}
  history: [],
  ready: false,
};

const $ = id => document.getElementById(id);
const chatEl = $("chat");
const statusEl = $("status");
const sendBtn = $("sendBtn");
const inputEl = $("input");
const booksBar = $("booksBar");

$("repo").value    = localStorage.getItem("zekai_repo")    || DEFAULT_REPO;
$("branch").value  = localStorage.getItem("zekai_branch")  || DEFAULT_BRANCH;
$("apiKey").value  = localStorage.getItem("zekai_key")     || DEFAULT_KEY;
$("ghToken").value = localStorage.getItem("zekai_ghtoken") || DEFAULT_GHTOKEN;
$("model").value   = localStorage.getItem("zekai_model")   || "gemini-2.0-flash";

// URL hash'inden konfigürasyon oku: index.html#pat=...&key=...&repo=owner/repo&branch=main&model=...
// Yer iminize bu linki kaydederseniz her açılışta otomatik dolar. Hash sunucuya gitmez.
(function readHashConfig() {
  if (!location.hash || location.hash.length < 2) return;
  const params = new URLSearchParams(location.hash.slice(1));
  const map = { pat: "ghToken", key: "apiKey", repo: "repo", branch: "branch", model: "model" };
  let changed = false;
  for (const [k, field] of Object.entries(map)) {
    const v = params.get(k);
    if (v) {
      $(field).value = v;
      localStorage.setItem("zekai_" + field.toLowerCase(), v);
      changed = true;
    }
  }
  if (changed) {
    // Hash'i adres çubuğundan temizle ki ekran paylaşırken görünmesin (kayıt zaten yapıldı).
    history.replaceState(null, "", location.pathname + location.search);
  }
})();

for (const id of ["repo","branch","apiKey","ghToken","model"]) {
  $(id).addEventListener("change", e => localStorage.setItem("zekai_"+id.toLowerCase(), e.target.value));
}

function ghHeaders(accept) {
  const h = {};
  if (accept) h["Accept"] = accept;
  const tok = $("ghToken").value.trim();
  if (tok) h["Authorization"] = "Bearer " + tok;
  return h;
}

function setStatus(t){ statusEl.textContent = t; }
function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function renderBooks() {
  booksBar.innerHTML = "";
  if (state.files.length === 0) {
    booksBar.innerHTML = `<span class="status">Henüz dosya yok. "Depoyu Tara & Yükle"ye basın.</span>`;
    return;
  }
  for (const f of state.files) {
    const div = document.createElement("div");
    const ok = !!f.text;
    div.className = "book" + (ok ? " loaded" : "");
    const size = ok ? `${f.text.length.toLocaleString("tr")} krk` : "yüklenmedi";
    div.innerHTML = `<span>${ok ? "✅" : "⬜"} ${f.path}</span><span class="badge">${size}</span>`;
    booksBar.appendChild(div);
  }
}

async function listRepoFiles(owner, repo, branch) {
  const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
  const r = await fetch(url, { headers: ghHeaders("application/vnd.github+json") });
  if (!r.ok) {
    if (r.status === 401 || r.status === 403 || r.status === 404)
      throw new Error("Depoya erişilemiyor (" + r.status + "). Private depo ise geçerli bir GitHub PAT girin.");
    throw new Error("GitHub API: " + r.status + " " + await r.text());
  }
  const data = await r.json();
  const out = [];
  for (const e of data.tree || []) {
    if (e.type !== "blob") continue;
    const ext = (e.path.split(".").pop() || "").toLowerCase();
    if (!TEXT_EXT.includes(ext) && !PDF_EXT.includes(ext)) continue;
    if (e.path === "index.html") continue;
    if (e.size && e.size > 25 * 1024 * 1024) continue;
    // Private repolarda raw.githubusercontent.com Authorization header'ı kabul etmez.
    // Bu yüzden contents API'yi raw media-type ile kullanırız.
    out.push({
      path: e.path, ext, sha: e.sha, size: e.size,
      url: `https://api.github.com/repos/${owner}/${repo}/contents/${e.path
              .split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(branch)}`
    });
  }
  return out;
}

async function fetchBlob(url) {
  const r = await fetch(url, { headers: ghHeaders("application/vnd.github.raw") });
  if (!r.ok) throw new Error("Dosya indirilemedi: " + r.status);
  return await r.arrayBuffer();
}

async function extractPdfText(url) {
  const data = await fetchBlob(url);
  const pdf = await pdfjsLib.getDocument({ data }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    text += c.items.map(it => it.str).join(" ") + "\n\n";
    if (i % 25 === 0) setStatus(`PDF sayfa ${i}/${pdf.numPages}`);
  }
  return text;
}

async function fetchText(url) {
  const buf = await fetchBlob(url);
  return new TextDecoder("utf-8").decode(buf);
}

async function loadAll() {
  $("refreshBtn").disabled = true;
  state.ready = false;
  sendBtn.disabled = true;
  try {
    const repo = $("repo").value.trim();
    const branch = $("branch").value.trim() || "main";
    const [owner, name] = repo.split("/");
    if (!owner || !name) throw new Error("Depo adı 'kullanici/repo' biçiminde olmalı.");
    setStatus(`Depo taranıyor: ${repo}@${branch}`);
    const files = await listRepoFiles(owner, name, branch);
    state.files = files;
    renderBooks();
    if (files.length === 0) { setStatus("Uygun dosya bulunamadı."); return; }
    let i = 0;
    for (const f of files) {
      i++;
      setStatus(`(${i}/${files.length}) Yükleniyor: ${f.path}`);
      try {
        if (PDF_EXT.includes(f.ext)) f.text = await extractPdfText(f.url);
        else f.text = await fetchText(f.url);
      } catch (e) {
        f.text = "";
        console.warn("Hata", f.path, e);
      }
      renderBooks();
    }
    state.ready = true;
    sendBtn.disabled = false;
    setStatus(`Hazır. ${files.filter(x=>x.text).length}/${files.length} dosya yüklendi.`);
    addMsg("bot", `Depodaki ${files.filter(x=>x.text).length} dosyayı okudum. Sormak istediğinizi yazın.`);
  } catch (e) {
    setStatus("Hata: " + e.message);
    addMsg("sys", e.message);
  } finally {
    $("refreshBtn").disabled = false;
  }
}

$("refreshBtn").onclick = loadAll;
$("clearBtn").onclick = () => { state.history = []; chatEl.innerHTML = ""; };

// Basit pasaj seçici
function findRelevantSnippets(query, perFileChars = 4000, maxFiles = 8) {
  const stop = new Set(["ve","ile","bir","bu","şu","ne","mi","mı","mu","mü","da","de","ki","için","gibi","göre","nedir","kimdir","nasıl","the","a","an","of","is","what","who","how"]);
  const terms = query.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu," ").split(/\s+/)
    .filter(w => w.length > 2 && !stop.has(w));
  if (terms.length === 0) terms.push(query.toLowerCase());

  const scored = [];
  for (const f of state.files) {
    if (!f.text) continue;
    const lower = f.text.toLowerCase();
    let score = 0;
    const hits = [];
    for (const t of terms) {
      let idx = 0, n = 0;
      while ((idx = lower.indexOf(t, idx)) !== -1 && n < 50) {
        hits.push(idx); idx += t.length; n++; score++;
      }
    }
    if (score > 0 || state.files.length <= maxFiles) scored.push({ f, score, hits });
  }
  scored.sort((a,b) => b.score - a.score);
  const top = scored.slice(0, maxFiles);
  const parts = [];
  for (const { f, hits } of top) {
    hits.sort((a,b)=>a-b);
    let collected = "";
    const used = [];
    for (const h of hits) {
      if (collected.length >= perFileChars) break;
      const s = Math.max(0, h - 300), e = Math.min(f.text.length, h + 500);
      if (used.some(([a,b]) => s < b && e > a)) continue;
      used.push([s,e]);
      collected += "\n...\n" + f.text.slice(s, e);
    }
    if (!collected) collected = f.text.slice(0, 1500);
    parts.push(`### ${f.path}\n${collected.trim()}`);
  }
  return parts.join("\n\n");
}

async function askGemini(query) {
  const apiKey = $("apiKey").value.trim();
  if (!apiKey) throw new Error("API anahtarı yok.");
  const model = $("model").value;
  const context = findRelevantSnippets(query);
  const sys = `Sen ZekAI'sın. Aşağıdaki depo dosyalarından elde edilen pasajlara dayanarak Türkçe yanıt ver. Cevabını verdiğin dosyayı parantez içinde belirt (örn: (1984.pdf)). Pasajlarda yanıt yoksa "Depoda bu bilgi bulunmuyor" de.

PASAJLAR:
${context}`;

  const contents = [];
  for (const m of state.history)
    contents.push({ role: m.role === "user" ? "user" : "model", parts: [{ text: m.text }] });
  contents.push({ role: "user", parts: [{ text: query }] });

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const resp = await fetch(url, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: sys }] },
      contents,
      generationConfig: { temperature: 0.4, maxOutputTokens: 1500 }
    })
  });
  if (!resp.ok) throw new Error("API: " + resp.status + " " + await resp.text());
  const data = await resp.json();
  return data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("\n") || "(Boş yanıt)";
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = "";
  addMsg("user", q);
  state.history.push({ role: "user", text: q });
  const thinking = addMsg("bot", "Düşünüyor…");
  sendBtn.disabled = true;
  try {
    const ans = await askGemini(q);
    thinking.textContent = ans;
    state.history.push({ role: "model", text: ans });
  } catch (e) {
    thinking.remove();
    addMsg("sys", e.message);
  } finally {
    sendBtn.disabled = !state.ready;
  }
}

sendBtn.onclick = send;
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Başlangıçta otomatik yükle
window.addEventListener("load", () => { renderBooks(); loadAll(); });
</script>
</body>
</html>
